# oneliner-test — prove the LIVE public one-liners on clean GitHub VMs.
# This tests the exact bytes the deck hands to strangers: the Pages-served
# flight bootstrapper (unix, sandboxed) and the Pages-served ring installer
# (Windows, real install path). Never triggers on pull_request.
name: oneliner-test

on:
  workflow_dispatch:
    inputs:
      ring:
        description: ring to exercise
        default: canary
        type: choice
        options: [canary, nightly, alpha, beta]

permissions:
  contents: read

jobs:
  flight-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Live public flight one-liner
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://kody-w.github.io/rapp-train/flight.sh | bash -s -- "${{ inputs.ring }}"
          curl -fsS http://localhost:7075/health
          kill "$(cat "$HOME/.rapp-flight/${{ inputs.ring }}/flight.pid")"

  join-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      # Proven launch shape from ring preflight: cmd owns the redirection so the
      # grandchild server inherits real writable handles — Start-Job/Start-Process
      # redirection wedges grandchildren on console semantics in consoleless CI.
      - name: Launch the live public one-liner (detached, console-safe)
        shell: powershell
        run: |
          $boot = "irm https://kody-w.github.io/rapp-${{ inputs.ring }}/install.ps1 | iex"
          $enc = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($boot))
          Start-Process cmd -ArgumentList '/c',"powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $enc > `"$env:RUNNER_TEMP\install.log`" 2>&1"

      - name: Wait for a serving brainstem
        shell: bash
        run: |
          set -uo pipefail
          for i in $(seq 1 120); do
            sleep 5
            if curl -sf http://localhost:7071/health -o "$RUNNER_TEMP/health.json"; then break; fi
            if [ "$i" = 120 ]; then echo "server never came up"; tail -60 "$RUNNER_TEMP/install.log" 2>/dev/null; exit 1; fi
          done
          cat "$RUNNER_TEMP/health.json"
          echo ""
          echo "LIVE public one-liner took a factory Windows VM to a serving brainstem"
